<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Voice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Drag handle — top bar -->
    <div id="titlebar" data-tauri-drag-region>
      <span id="app-name">🎙 Vibe Voice</span>
      <div id="titlebar-actions">
        <button id="settings-btn" title="Settings">⚙</button>
        <button id="close-btn" title="Close">✕</button>
      </div>
    </div>

    <!-- Main content -->
    <div id="content">
      <!-- Mic button -->
      <div id="mic-wrap">
        <button id="mic-btn" title="Hold to record">
          <svg id="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8" y1="21" x2="16" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <!-- Ripple rings (shown while recording) -->
          <span class="ring ring-1"></span>
          <span class="ring ring-2"></span>
        </button>
      </div>

      <!-- Status + transcript -->
      <div id="info">
        <p id="status">Hold to record</p>
        <p id="hint">Ctrl+Space · drag to move</p>
        <p id="transcript"></p>
      </div>
    </div>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel">
      <label for="api-key-input">Groq API Key</label>
      <input id="api-key-input" type="password" placeholder="Paste your Groq API key here…" autocomplete="off" />
      <div id="settings-actions">
        <button id="settings-save-btn">Save</button>
        <button id="settings-cancel-btn">Cancel</button>
      </div>
      <p id="settings-status"></p>
    </div>
  </div>

  <script defer src="main.js"></script>
</body>
</html>
